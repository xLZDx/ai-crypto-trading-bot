<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Trader — BPMN Business Flows</title>
  <link rel="stylesheet"
        href="https://unpkg.com/bpmn-js@17/dist/assets/diagram-js.css" />
  <link rel="stylesheet"
        href="https://unpkg.com/bpmn-js@17/dist/assets/bpmn-js.css" />
  <link rel="stylesheet"
        href="https://unpkg.com/bpmn-js@17/dist/assets/bpmn-font/css/bpmn.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0; height: 100vh;
      display: flex; flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
    }
    header {
      padding: 12px 18px;
      background: #1e293b; color: #f1f5f9;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid #334155;
    }
    header h1 { margin: 0; font-size: 1rem; font-weight: 700; letter-spacing: .02em; }
    header select {
      background: #0f172a; color: #f1f5f9;
      border: 1px solid #475569; border-radius: 6px;
      padding: 6px 10px; font-size: .85rem;
    }
    header .meta { font-size: .72rem; color: #94a3b8; margin-left: auto; }
    #canvas { flex: 1; min-height: 0; background: #fff; }
    .controls { display: flex; gap: 6px; align-items: center; }
    .controls button {
      background: #334155; color: #cbd5e1; border: 1px solid #475569;
      border-radius: 5px; padding: 4px 11px; cursor: pointer;
      font-size: .78rem;
    }
    .controls button:hover { background: #475569; color: #fff; }
    .footer-tip {
      padding: 6px 16px; font-size: .72rem; color: #64748b;
      background: #e2e8f0; border-top: 1px solid #cbd5e1;
    }
    .err { color: #fb7185; padding: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>📊 AI Trader — Business Flows (BPMN 2.0)</h1>
    <select id="flow-select">
      <optgroup label="— Business processes (decision-heavy) —">
        <option value="TrainingFlow.bpmn">Training pipeline — operator → KEEP/REVIEW/RETIRE</option>
        <option value="TradingFlow.bpmn">Live trading — WS tick → filled order</option>
        <option value="RiskGates.bpmn">Risk gates — RiskAgent 9-gate stack</option>
      </optgroup>
      <optgroup label="— Lifecycles (load / claim / loop) —">
        <option value="ModelsLifecycle.bpmn">Models lifecycle — load + HMAC verify + predict</option>
        <option value="RegistryClaim.bpmn">process_registry.claim_role — atomic decision tree</option>
        <option value="AgentLifecycle.bpmn">BaseAgent lifecycle — init → loop → stop</option>
      </optgroup>
      <optgroup label="— Dispatch (orchestration) —">
        <option value="TrainerDispatch.bpmn">Trainer dispatch — factory → train → sign → meta JSON</option>
        <option value="InfraStartup.bpmn">Infrastructure startup — restart_all.ps1 → 11 roles</option>
      </optgroup>
    </select>
    <div class="controls">
      <button onclick="zoomFit()">🗂 Fit</button>
      <button onclick="zoomIn()">+</button>
      <button onclick="zoomOut()">−</button>
      <button onclick="downloadXML()">⬇ XML</button>
      <button onclick="downloadSVG()">⬇ SVG</button>
    </div>
    <div class="meta">bpmn-js v17 from unpkg · 2026-05-13</div>
  </header>
  <div id="canvas"></div>
  <div class="footer-tip">
    Tip — drag to pan, scroll to zoom. Click any task/gateway to read its
    properties. These diagrams are valid BPMN 2.0 and import cleanly into
    Camunda Modeler, Draw.io, or any conforming BPMN tool.
  </div>

  <script src="https://unpkg.com/bpmn-js@17/dist/bpmn-navigated-viewer.development.js"></script>
  <script>
    const viewer = new BpmnJS({ container: '#canvas' });
    let currentXML = '';

    async function loadFlow(filename) {
      try {
        const r = await fetch(filename + '?_=' + Date.now());
        if (!r.ok) throw new Error('HTTP ' + r.status + ' on ' + filename);
        currentXML = await r.text();
        await viewer.importXML(currentXML);
        zoomFit();
      } catch (e) {
        document.getElementById('canvas').innerHTML =
          '<div class="err">Failed to load ' + filename + ': ' + e.message +
          '<br><br>If you opened this as a local <code>file://</code> URL, the ' +
          'browser blocks fetch(). Serve the folder with:<br>' +
          '<code>cd core/bpmn && python -m http.server 8088</code><br>' +
          'then open <code>http://localhost:8088/</code>.</div>';
      }
    }

    function zoomFit() { viewer.get('canvas').zoom('fit-viewport'); }
    function zoomIn()  { viewer.get('zoomScroll').stepZoom(1);  }
    function zoomOut() { viewer.get('zoomScroll').stepZoom(-1); }

    function downloadXML() {
      const blob = new Blob([currentXML], { type: 'application/xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = document.getElementById('flow-select').value;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function downloadSVG() {
      const { svg } = await viewer.saveSVG({ format: true });
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = document.getElementById('flow-select').value.replace('.bpmn', '.svg');
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('flow-select').addEventListener('change', e => {
      loadFlow(e.target.value);
    });

    loadFlow('TrainingFlow.bpmn');
  </script>
</body>
</html>
