name: "PR-Agent — Quant Code Review"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'issue_comment' && github.event.issue.pull_request) }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: Run PR Agent
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_REVIEWER.EXTRA_INSTRUCTIONS: |
            You are a Senior Quantitative Engineer reviewing code for a personal-use
            high-frequency crypto trading system. The stack: DuckDB, HistGradientBoosting,
            Walk-Forward CV (PurgedKFold), Meta-Labeling (Lopez de Prado AFML), Optuna TPE.

            HARD REJECT any PR that contains:
            1. ATR squaring: vol_norm = atr / atr_mean followed by pt * atr * vol_norm
               (correct form: dynamic_tp = pt_multiplier * atr — ATR applied once only)
            2. Timeout rows dropped: df[df['tb_label'] != 0] — timeouts must be kept as negative class (label=0)
            3. Missing t1-span purging: self.t1 stored in __init__ but never read in split()
            4. Look-ahead bias: any feature using future bar data (close[t+1] available at t)
            5. iterrows/itertuples loops in hot paths — vectorize with pandas/numpy
            6. bare except Exception in ML inference returning PASS — must fail CLOSED (BLOCK)
            7. joblib.load() without verify_and_load_bytes() HMAC check
            8. Python == for API key comparison — must use hmac.compare_digest()
            9. 0.0.0.0 as default bind address — must be 127.0.0.1
            10. META_FEATURES defined locally in a file — must import from src/utils/meta_config.py

            Flag as WARNING:
            - Hardcoded threshold values (should load from model meta JSON)
            - Missing class_weight='balanced' on HistGBT or LogisticRegression
            - CalibratedClassifierCV not using method='isotonic'
            - Sharpe ratio reported without PSR (Probabilistic Sharpe Ratio) deflation
            - DuckDB connections missing temp_directory setting
          PR_REVIEWER.REQUIRE_FOCUSED_REVIEW: "true"
          PR_REVIEWER.NUM_CODE_SUGGESTIONS: "5"
